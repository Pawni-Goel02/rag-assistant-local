<!DOCTYPE html>
<html>
<head>
    <title>Local RAG Assistant</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" href="/static/styles.css">
</head>

<body>

<div class="container-fluid vh-100">

    <div class="row h-100">

        <div class="col-md-3 sidebar">

            <h3 class="mt-3">RAG Assistant</h3>

            <hr>

            <h5>Upload Documents</h5>

            <input
            type="file"
            id="file-input"
            class="form-control mb-2"
            accept = ".pdf,.docx,.txt"
            />

            <button
            id="upload-btn"
            class="btn btn-primary w-100"
            >
            Upload
            </button><hr>
            <input
    id="url-input"
    class="form-control mb-2"
    placeholder="https://example.com"
/>

<button
    id="url-btn"
    class="btn btn-success w-100">
    Add URL
</button>
                        <button
    id="new-chat-btn"
    class="btn btn-outline-secondary w-100 mb-3">
     New Chat
</button><hr>
<button
    id="clear-docs-btn"
    class="btn btn-outline-danger w-100 mb-3">
    Clear Documents
</button>

        <div
            id="upload-status"
            class="mt-2"
        ></div>

            <hr>

            <h5>Indexed Documents</h5>

            <div id="document-list">

                No documents yet

            </div>

        </div>

        <div class="col-md-9 chat-area">

            <div id="chat-window">

                <div class="assistant-message">

                    Hello! Upload documents and ask questions.

                </div>

            </div>

            <div class="chat-input-area d-flex gap-2">

    <input
        type="text"
        id="message-input"
        class="form-control"
        placeholder="Ask a question..."
    >

    <button
        id="send-btn"
        class="btn btn-primary"
    >
        Send
    </button>

</div>

        </div>

    </div>

</div>

<script src="/static/app.js"></script>

</body>
</html>
